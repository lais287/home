<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu com Barra Dinâmica</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav li {
            margin: 25px 0;
            opacity: 0;
            animation: slideIn 0.5s forwards;
        }

        /* O LINK (TEXTO) */
        nav li a {
            text-decoration: none;
            font-size: 3.5rem;
            text-transform: uppercase;
            display: inline-block;
            position: relative; /* Agora a barra se baseia aqui */
            padding: 0 15px;    /* Cria o "respiro" natural nas laterais */
            
            color: transparent; 
            -webkit-text-stroke: 1.5px #555;
            
            background: linear-gradient(to right, #007bff 50%, transparent 50%);
            background-size: 200% 100%;
            background-position: 100% 0;
            -webkit-background-clip: text;
            background-clip: text;
            
            transition: background-position 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        -webkit-text-stroke 0.6s,
                        -webkit-text-fill-color 0.6s;
        }

        /* A BARRA AZUL DENTRO DO LINK */
        .bar {
            position: absolute;
            left: 0; /* Inicia colada no padding esquerdo */
            top: 15%;
            width: 8px;
            height: 70%;
            background-color: #007bff;
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            border-radius: 2px;
        }

        /* HOVER */
        nav li:hover a {
            background-position: 0 0;
            -webkit-text-stroke: 1.5px #007bff; 
            -webkit-text-fill-color: #007bff;
        }

        nav li:hover .bar {
            /* Move exatamente para o final da largura do texto */
            left: calc(100% - 8px); 
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        nav li:nth-child(1) { animation-delay: 0.1s; }
        nav li:nth-child(2) { animation-delay: 0.2s; }
        nav li:nth-child(3) { animation-delay: 0.3s; }
        nav li:nth-child(4) { animation-delay: 0.4s; }
        nav li:nth-child(5) { animation-delay: 0.5s; }

    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="#"><div class="bar"></div>Home</a></li>
        <li><a href="#"><div class="bar"></div>About</a></li>
        <li><a href="#"><div class="bar"></div>Services</a></li>
        <li><a href="#"><div class="bar"></div>Team</a></li>
        <li><a href="#"><div class="bar"></div>Contact</a></li>
    </ul>
</nav>

</body>
</html>
